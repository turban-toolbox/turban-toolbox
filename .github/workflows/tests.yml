name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.14"
          - python-version: "3.11"
            minimum-deps: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: ${{ !matrix.minimum-deps }}
        run: uv sync --all-groups

      - name: Install minimum dependencies
        if: ${{ matrix.minimum-deps }}
        run: uv sync --all-groups --resolution=lowest-direct

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: data/
          key: testdata-${{ hashFiles('turban/utils/filepaths.py') }}

      - name: Run tests
        env:
          TURBAN_AUTO_DOWNLOAD_TEST_FILES: "1"
        run: uv run pytest tests/ docs/ --cov=turban --cov-report=xml

      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.14' && github.event.pull_request.head.repo.fork == false && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
