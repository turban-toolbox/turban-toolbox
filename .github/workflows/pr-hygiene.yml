name: PR Hygiene

on:
  pull_request:

jobs:
  check-docs-and-tests:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-hygiene') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for accompanying test and documentation changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE"..."$HEAD")
          echo "Changed files:"
          echo "$changed"

          source_changed=$(echo "$changed" | grep -E '^turban/' || true)
          tests_changed=$(echo "$changed"  | grep -E '^tests/'  || true)
          docs_changed=$(echo "$changed"   | grep -E '^docs/'   || true)

          if [ -z "$source_changed" ]; then
            echo "No changes to turban/ — skipping check."
            exit 0
          fi

          echo ""
          echo "Source changes detected:"
          echo "$source_changed"

          failed=0

          if [ -z "$tests_changed" ]; then
            echo ""
            echo "::error::Source code in turban/ was changed but no test files in tests/ were modified."
            echo "  Please add or update tests that cover your changes."
            failed=1
          else
            echo ""
            echo "Test changes present:"
            echo "$tests_changed"
          fi

          if [ -z "$docs_changed" ]; then
            echo ""
            echo "::error::Source code in turban/ was changed but no documentation files in docs/ were modified."
            echo "  Please update the documentation to reflect your changes."
            failed=1
          else
            echo ""
            echo "Documentation changes present:"
            echo "$docs_changed"
          fi

          exit $failed
