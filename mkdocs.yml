repo_name: turban-toolbox
repo_url: https://github.com/turban-toolbox/turban-toolbox
edit_uri: edit/main/docs/

site_name: Turbulence analysis (TURBAN) toolbox
theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append(".") # Allows MkDocs to find the source code

markdown_extensions:
  - footnotes
  - attr_list
  - pymdownx.superfences
  - admonition

nav:
  - Home: index.md
  - Quickstart: quickstart.md    
  - API Reference: api.md
  - GitHub Repository: https://github.com/turban-toolbox/turban-toolbox
