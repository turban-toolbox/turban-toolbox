[project]
name = "turban-toolbox"
dynamic = ["version"]
description = "Turbulence Analysis Toolbox"
authors = [
    { name = "Achim Randelhoff", email = "ara@akvaplan.niva.no" },
    { name = "Peter Holtermann", email = "peter.holtermann@io-warnemuende.de" },
]
license = { text = "GPLv03" }
dependencies = [
    'beartype',
    'datashader',
    'gsw',
    'hvplot',
    'jaxtyping',
    'matplotlib',
    'netCDF4',
    'numba',
    'numpy',
    'pandas',
    'panel',
    'pydantic',
    'pytest-cov',
    'pytest',
    'scipy',
    'setuptools',
    'xarray',
]
requires-python = ">=3.9"
readme = "README.md"
classifiers = [
    'Development Status :: 4 - Beta',
    'Topic :: Scientific/Engineering',
    'Intended Audience :: Science/Research',
    'License :: OSI Approved :: GNU General Public License v3 (GPLv3)',
    'Operating System :: OS Independent',
    'Programming Language :: Python :: 3 :: Only',
]

[project.scripts]


[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = false

[tool.setuptools.packages.find]

[tool.setuptools.package-data]
"*" = ["VERSION"]

[tool.pytest.ini_options]
addopts = "--cov=<project-name> --cov-report html"
filterwarnings = "always::UserWarning"
